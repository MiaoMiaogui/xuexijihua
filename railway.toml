# 学伴 StudyBuddy 后端 · Railway 部署配置（纯 Node + 托管 MySQL/Redis）
# 轻量 Dockerfile：不含 MariaDB/Redis，由 Railway 插件提供数据库。
# 需要在 Railway 项目内添加 MySQL + Redis 服务（免费插件）。

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
