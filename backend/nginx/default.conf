# 学伴 StudyBuddy · Nginx 反代配置
# 公网只暴露 80/443，所有 /api 与 /uploads 流量转发到 backend 容器（端口 4000）

server {
    listen 80;
    server_name _;

    # ===== 启用 HTTPS 时取消下面两行注释（配合 certbot 证书）=====
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # # HTTP 全部跳转到 HTTPS
    # return 301 https://$host$request_uri;

    client_max_body_size 12m;  # 支持拍照 OCR 的 base64 图片上传

    # 后端 API（完整路径透传：/api/xxx -> backend:4000/api/xxx）
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OCR 持久化图片（本地存储时通过 /uploads 访问）
    location /uploads/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }

    # 健康检查
    location = /health {
        proxy_pass http://backend:4000;
    }
}
